name: Update TryHackMe Progress

on:
  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-tryhackme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch TryHackMe data
        run: |
          USERNAME="gvbytes"
          OUTFILE="data/tryhackme.json"
          mkdir -p data

          # Fetch badges
          BADGES_RAW=$(curl -s "https://tryhackme.com/api/badges/get/${USERNAME}" || echo "null")

          # Fetch rank info
          RANK_RAW=$(curl -s "https://tryhackme.com/api/user/rank/${USERNAME}" || echo "null")

          # Fetch completed rooms
          ROOMS_RAW=$(curl -s "https://tryhackme.com/api/no-completed-rooms-public/${USERNAME}" || echo "null")

          # Fetch room list
          ROOM_LIST_RAW=$(curl -s "https://tryhackme.com/api/all-completed-rooms?username=${USERNAME}" || echo "[]")

          # Parse rank
          RANK=$(echo "$RANK_RAW" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              print(data.get('userRank', 'N/A'))
          except:
              print('N/A')
          " 2>/dev/null || echo "N/A")

          # Parse rooms completed count
          ROOMS_COMPLETED=$(echo "$ROOMS_RAW" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              print(data if isinstance(data, int) else 0)
          except:
              print(0)
          " 2>/dev/null || echo "0")

          # Parse room list into completed_rooms array
          COMPLETED_ROOMS=$(echo "$ROOM_LIST_RAW" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              rooms = []
              if isinstance(data, list):
                  for room in data:
                      title = room.get('title', room.get('name', 'Unknown'))
                      rooms.append({'title': title, 'status': 'completed'})
              print(json.dumps(rooms))
          except:
              print('[]')
          " 2>/dev/null || echo "[]")

          # Parse badges
          BADGES=$(echo "$BADGES_RAW" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              badges = []
              if isinstance(data, list):
                  for b in data:
                      badges.append(b.get('name', 'Badge'))
              print(json.dumps(badges))
          except:
              print('[]')
          " 2>/dev/null || echo "[]")

          # Build final JSON
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          python3 -c "
          import json, sys

          completed_rooms_str = '''${COMPLETED_ROOMS}'''
          badges_str = '''${BADGES}'''

          try:
              completed_rooms = json.loads(completed_rooms_str)
          except:
              completed_rooms = []

          try:
              badges = json.loads(badges_str)
          except:
              badges = []

          # If API returned nothing, keep existing data
          if not completed_rooms:
              try:
                  with open('${OUTFILE}', 'r') as f:
                      existing = json.load(f)
                      completed_rooms = existing.get('completed_rooms', [])
                      if not badges:
                          badges = existing.get('badges', [])
              except:
                  completed_rooms = [
                      {'title': 'Offensive Security Intro', 'status': 'completed'},
                      {'title': 'Defensive Security Intro', 'status': 'completed'}
                  ]

          result = {
              'username': '${USERNAME}',
              'profile_url': 'https://tryhackme.com/p/${USERNAME}',
              'rank': '${RANK}' if '${RANK}' != 'N/A' else None,
              'rooms_completed': int('${ROOMS_COMPLETED}') if '${ROOMS_COMPLETED}'.isdigit() else len(completed_rooms),
              'badges': badges,
              'completed_rooms': completed_rooms,
              'last_updated': '${NOW}'
          }

          with open('${OUTFILE}', 'w') as f:
              json.dump(result, f, indent=2)
              f.write('\n')

          print(f'Updated {len(completed_rooms)} rooms, {len(badges)} badges')
          " || echo "Python parsing failed, keeping existing data"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/tryhackme.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tryhackme.json
          git commit -m "Auto-update TryHackMe progress [skip ci]"
          git push
